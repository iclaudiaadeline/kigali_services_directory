name: kigali_services_directory
description: A Flutter mobile application for Kigali City Services & Places Directory with Firebase integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.2
  
  # State Management
  provider: ^6.1.1
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.2
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
